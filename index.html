<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tmt.page</title>
  <meta name="description" content="Small single-purpose web tools, each at its own path." />
  <meta name="theme-color" content="#141a17" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%9E%A1%EF%B8%8F</text></svg>" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: grid;
      place-items: center;
      font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #e9e3d5;
      background: #141a17;
      padding: 2rem;
    }
    main { max-width: 34rem; }
    h1 { margin: 0 0 .4rem; font-size: 2rem; letter-spacing: -0.02em; }
    p { margin: 0; color: #9fb0a5; }
    code { background: #1f2a24; padding: .1rem .4rem; border-radius: 6px; color: #e9e3d5; }
    a { color: #d98a2b; }
  </style>
</head>
<body>
  <main>
    <h1>tmt.page</h1>
    <p>Single-purpose tools, each at its own path — e.g. <code><a href="/camping/">tmt.page/camping</a></code>.</p>
  </main>
</body>
</html>
